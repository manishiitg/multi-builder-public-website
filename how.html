<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>How it works — AgentForge</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" sizes="256x256" href="apple-touch-icon.png">
<link rel="shortcut icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="hifi.css">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">window.h = React.createElement;</script>
<script type="text/babel" src="hifi_hero.jsx"></script>
<script type="text/babel" src="hifi_sections.jsx"></script>
<script type="text/babel" src="hifi_how_intro.jsx"></script>
<script type="text/babel" src="hifi_how_mockups.jsx"></script>
<script type="text/babel" src="hifi_how_layers.jsx"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const TWEAKS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "productName": "AgentForge"
}/*EDITMODE-END*/;

const NAME_OPTIONS = ['AgentForge', 'Forge', 'Loom', 'Hive', 'Conductor'];

function App() {
  const [theme, setTheme] = useState(TWEAKS.theme);
  const [name, setName] = useState(TWEAKS.productName);
  const [panelOpen, setPanelOpen] = useState(false);

  useEffect(() => {
    document.body.classList.toggle('light', theme === 'light');
  }, [theme]);

  useEffect(() => {
    function onMsg(e) {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') setPanelOpen(true);
      if (d.type === '__deactivate_edit_mode') setPanelOpen(false);
    }
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  function update(patch) {
    if ('theme' in patch) setTheme(patch.theme);
    if ('productName' in patch) setName(patch.productName);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: patch }, '*');
  }

  return h(React.Fragment, null,
    h(window.Nav, { name, current: 'how' }),
    h(window.HowHero2, { name }),
    h(window.WhatIsWorkflow),
    h(window.Lifecycle),
    h(window.MockupsIntro),
    h(window.BuilderScreen),
    h(window.RunSetupScreen),
    h(window.LiveExecScreen),
    h(window.ReviewScreen),
    h(window.SupportLayers),
    h(window.HitlAndSchedule),
    h(window.CTA),
    h(window.Footer, { name }),
    h('div', { className: `tweak-panel ${panelOpen ? 'visible' : ''}` },
      h('h4', null, 'Tweaks'),
      h('div', { className: 'tweak-row' },
        h('span', null, 'Dark / light'),
        h('button', { className: `toggle ${theme === 'dark' ? 'on' : ''}`,
          onClick: () => update({ theme: theme === 'dark' ? 'light' : 'dark' }) })
      ),
      h('div', { className: 'tweak-row' },
        h('span', null, 'Product name'),
        h('select', {
          value: name,
          onChange: e => update({ productName: e.target.value }),
          style: { background: 'var(--bg-3)', color: 'var(--fg)', border: '1px solid var(--line)', borderRadius: 6, padding: '4px 8px', fontFamily: 'JetBrains Mono', fontSize: 11 }
        },
          NAME_OPTIONS.map(n => h('option', { key: n, value: n }, n))
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
